name: Phoenix Inwarranty Flow collection execution

on: 
  push: 
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install nodejs and npm
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22'
          
      - name: Install newman and html-extra globally
        run: |
             npm install -g newman
             npm install -g newman-reporter-htmlextra
          
      - name: Run the postman collection with newman
        continue-on-error: true
        run: |
          mkdir -p newman
          newman run 'Inwarranty-flow_Collection.postman_collection.json' \
            -e QA.postman_environment.json \
            -d testData.csv \
            -r cli,htmlextra \
            --reporter-html-extra-export ./newman/index.html

      - name: Verify report
        run: |
           ls -l newman
             
      - name: Upload a newman report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-github-pages@v3.1.12
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/
          publish_branch: gh-pages
          force_orphan: true
          

  
